<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card {{INDEX}} - {{TITLE}}</title>
<style>
  /* ===== 全局重置 ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ===== 主题变量 ===== */
  :root {
    /* 浅色主题默认值 */
    --bg-primary: #FAFAF9;
    --bg-card: #FFFFFF;
    --bg-accent: #F5F0EB;
    --text-primary: #1A1A1A;
    --text-secondary: #6B6B6B;
    --text-tertiary: #999999;
    --accent: #2D5BE3;
    --accent-light: #E8EFFC;
    --border: #E8E4DF;
    --shadow: 0 2px 16px rgba(0,0,0,0.06);
    --gradient-start: #2D5BE3;
    --gradient-end: #7C3AED;
  }

  [data-theme="dark"] {
    --bg-primary: #0F0F0F;
    --bg-card: #1A1A1A;
    --bg-accent: #252525;
    --text-primary: #F0F0F0;
    --text-secondary: #A0A0A0;
    --text-tertiary: #707070;
    --accent: #6B9FFF;
    --accent-light: #1A2A44;
    --border: #333333;
    --shadow: 0 2px 16px rgba(0,0,0,0.3);
    --gradient-start: #6B9FFF;
    --gradient-end: #A855F7;
  }

  body {
    background: var(--bg-primary);
    font-family: -apple-system, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ===== 卡片容器 3:4 ===== */
  .card {
    width: 1080px;
    height: 1440px;
    background: var(--bg-card);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 80px 72px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* 顶部装饰线 */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
  }

  /* ===== 序号徽章 ===== */
  .card-number {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
    color: #FFFFFF;
    font-size: 28px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
  }

  /* ===== 标题 ===== */
  .card-title {
    font-size: 48px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.35;
    margin-bottom: 32px;
    letter-spacing: -0.02em;
  }

  .card-title .highlight {
    background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ===== 正文 ===== */
  .card-body {
    font-size: 32px;
    color: var(--text-secondary);
    line-height: 1.75;
    flex: 1;
  }

  .card-body p { margin-bottom: 20px; }
  .card-body p:last-child { margin-bottom: 0; }

  .card-body strong {
    color: var(--text-primary);
    font-weight: 600;
  }

  .card-body ul {
    padding-left: 28px;
    margin: 16px 0;
  }

  .card-body li {
    margin-bottom: 12px;
  }

  .card-body li::marker {
    color: var(--accent);
  }

  /* ===== 引用块 ===== */
  .card-quote {
    background: var(--bg-accent);
    border-left: 4px solid var(--accent);
    border-radius: 12px;
    padding: 28px 32px;
    margin: 24px 0;
    font-size: 28px;
    color: var(--text-secondary);
    font-style: italic;
    line-height: 1.7;
  }

  /* ===== 底部来源 ===== */
  .card-footer {
    margin-top: auto;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-source {
    font-size: 22px;
    color: var(--text-tertiary);
  }

  .card-page {
    font-size: 22px;
    color: var(--text-tertiary);
    font-weight: 500;
  }

  /* ===== 封面卡片特殊样式 ===== */
  .card.cover {
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 100px 80px;
  }

  .card.cover .cover-tag {
    display: inline-block;
    padding: 12px 28px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 100px;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 48px;
    letter-spacing: 0.05em;
  }

  .card.cover .cover-title {
    font-size: 64px;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1.3;
    margin-bottom: 40px;
    letter-spacing: -0.03em;
  }

  .card.cover .cover-subtitle {
    font-size: 32px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 60px;
  }

  .card.cover .cover-meta {
    font-size: 22px;
    color: var(--text-tertiary);
  }

  /* ===== 结尾卡片 ===== */
  .card.ending {
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .card.ending .ending-icon {
    font-size: 72px;
    margin-bottom: 40px;
  }

  .card.ending .ending-text {
    font-size: 40px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 24px;
  }

  .card.ending .ending-sub {
    font-size: 28px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 48px;
  }

  .card.ending .ending-cta {
    padding: 20px 48px;
    background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
    color: #FFF;
    border-radius: 100px;
    font-size: 28px;
    font-weight: 600;
    text-decoration: none;
  }
</style>
</head>
<body>
{{CARD_CONTENT}}
</body>
</html>
