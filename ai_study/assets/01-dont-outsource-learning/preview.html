<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>不要把学习外包给 AI｜封面与小红书卡片</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #ece2d2;
      color: #133b38;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
    }
    header {
      max-width: 1180px;
      margin: 0 auto;
      padding: 42px 24px 18px;
    }
    h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1.15;
      letter-spacing: 0;
    }
    p {
      margin: 10px 0 0;
      color: #64726e;
      font-size: 18px;
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 24px 64px;
    }
    .cover {
      width: 100%;
      border-radius: 18px;
      box-shadow: 0 18px 48px rgba(8,36,34,.18);
      background: #fff;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 26px;
      margin-top: 34px;
    }
    .grid img {
      width: 100%;
      border-radius: 18px;
      box-shadow: 0 18px 48px rgba(8,36,34,.15);
      background: #fff;
    }
  </style>
</head>
<body>
  <header>
    <h1>不要把学习外包给 AI</h1>
    <p>公众号封面 + 小红书 8 页卡片 · AI生命克劳德</p>
  </header>
  <main>
    <img class="cover" src="svg/wechat-cover.svg" alt="公众号封面">
    <section class="grid">
      <img src="svg/01-cover.svg" alt="01-cover.svg">
      <img src="svg/02-illusion.svg" alt="02-illusion.svg">
      <img src="svg/03-delivery-vs-growth.svg" alt="03-delivery-vs-growth.svg">
      <img src="svg/04-four-actions.svg" alt="04-four-actions.svg">
      <img src="svg/05-ai-roles.svg" alt="05-ai-roles.svg">
      <img src="svg/06-universal-flow.svg" alt="06-universal-flow.svg">
      <img src="svg/07-prompt-constraint.svg" alt="07-prompt-constraint.svg">
      <img src="svg/08-series-preview.svg" alt="08-series-preview.svg">
    </section>
  </main>
</body>
</html>
