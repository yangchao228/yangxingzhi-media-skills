  <text x="78" y="558" font-family='"PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif' font-size="22" font-weight="650" fill="rgba(255,250,240,0.72)">AI生命克劳德 · 别把学习外包给 AI 系列 01</text>
